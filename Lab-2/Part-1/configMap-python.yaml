# Конфиги для подов — инструкции — что поды будут делать после запуска
# Конфиг на выполнение счета + сохранение количества посещений сайта
apiVersion: v1
kind: ConfigMap
metadata:
  name: python-app-config
data:
  app.py: |
    #gpt-code
    import time
    import redis
    from flask import Flask
    import os

    app = Flask(__name__)

    # Берем настройки из переменных окружения, которые мы пропишем в YAML
    REDIS_HOST = os.getenv("REDIS_HOST", "redis-service")
    REDIS_PORT = os.getenv("REDIS_PORT", "7777")

    # Подключаемся к базе
    cache = redis.Redis(host=REDIS_HOST, port=REDIS_PORT)

    def get_hit_count():
        retries = 5
        while True:
            try:
                return cache.incr('hits') # Увеличиваем счетчик в Redis
            except redis.exceptions.ConnectionError as exc:
                if retries == 0:
                    raise exc
                retries -= 1
                time.sleep(0.5)

    @app.route('/')
    def hello():
        count = get_hit_count()
        return f'Привет! Я работаю в Kubernetes. Эту страницу открывали {count} раз.\n'

    if __name__ == "__main__":
        app.run(host="0.0.0.0", port=80, debug=True)
